<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Ocyto - Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="aide-btn" id="aide">Aide</button>

  <div class="ruche-container">
    <svg class="ruche" id="ruche" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Central (100,100) -->
      <polygon class="hex" points="100,70 126,85 126,115 100,130 74,115 74,85" />
      <!-- θ=0  (151.96,100) -->
      <polygon class="hex" points="151.96,70 177.94,85 177.94,115 151.96,130 125.98,115 125.98,85" />
      <!-- θ=60 (125.98,55) -->
      <polygon class="hex" points="125.98,25 151.96,40 151.96,70 125.98,85 100,70 100,40" />
      <!-- θ=120 (74.02,55) -->
      <polygon class="hex" points="74.02,25 100,40 100,70 74.02,85 48.04,70 48.04,40" />
      <!-- θ=180 (48.04,100) -->
      <polygon class="hex" points="48.04,70 74.02,85 74.02,115 48.04,130 22.06,115 22.06,85" />
      <!-- θ=240 (74.02,145) -->
      <polygon class="hex" points="74.02,115 100,130 100,160 74.02,175 48.04,160 48.04,130" />
      <!-- θ=300 (125.98,145) -->
      <polygon class="hex" points="125.98,115 151.96,130 151.96,160 125.98,175 100,160 100,130" />
    </svg>
  </div>

  <div class="menu-container" id="menu">

    <div class="menu-item">
      <svg class="menu-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex" points="50,5 93,30 93,70 50,95 7,70 7,30" />
      </svg>
      <span class="menu-label">Rafraîchir</span>
    </div>

    <div class="menu-item">
      <svg class="menu-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex" points="50,5 93,30 93,70 50,95 7,70 7,30" />
      </svg>
      <span class="menu-label">Signaler</span>
    </div>

    <div class="menu-item">
      <svg class="menu-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex" points="50,5 93,30 93,70 50,95 7,70 7,30" />
      </svg>
      <span class="menu-label">Découvrir</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
